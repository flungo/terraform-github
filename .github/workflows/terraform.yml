name: Terraform

# Thin caller of the reusable flungo/github-workflows terraform.yml (pinned @v1).
# Single owner (flungo) for now — generalise to a matrix over owners/* when a
# second owner is onboarded (with per-owner secrets, likely via GitHub
# Environments — tracked follow-up).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Operation
        required: true
        default: plan
        type: choice
        options: [plan, apply]

jobs:
  terraform:
    permissions:
      contents: read
      pull-requests: write
    uses: flungo/github-workflows/.github/workflows/terraform.yml@v1
    with:
      working-directory: owners/flungo
      concurrency-group: terraform-flungo
      plan-comment-marker: '<!-- terraform-plan-flungo -->'
      tf-var-name: TF_VAR_github_token
      operation: ${{ github.event.inputs.operation || 'plan' }}
    secrets:
      TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      provider_token: ${{ secrets.FLUNGO_GITHUB_TOKEN }}
