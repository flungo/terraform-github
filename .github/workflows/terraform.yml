name: Terraform

# Adapted from terraform-grafana-cloud's terraform.yml. Single owner (flungo) for
# now — generalise to a matrix over owners/* when a second owner is onboarded
# (with per-owner secrets, likely via GitHub Environments — tracked follow-up).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Operation
        required: true
        default: plan
        type: choice
        options: [plan, apply]

concurrency:
  group: terraform-flungo
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: owners/flungo

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_github_token: ${{ secrets.FLUNGO_GITHUB_TOKEN }}
      TF_INPUT: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init

      - name: Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Validate
        id: validate
        run: terraform validate -no-color

      - name: Plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -json -out=tfplan | tee plan.jsonl
        continue-on-error: true

      - name: Plan display
        id: plan_show
        if: steps.plan.outcome == 'success'
        run: terraform show -no-color tfplan > plan.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = 'owners/flungo';
            const marker = '<!-- terraform-plan-flungo -->';

            // Parse the JSONL plan output to find the change_summary message.
            let summary = '';
            let emoji = '❓';
            const planJson = fs.existsSync(`${dir}/plan.jsonl`) ? fs.readFileSync(`${dir}/plan.jsonl`, 'utf8') : '';
            for (const line of planJson.split('\n')) {
              if (!line.trim()) continue;
              try {
                const msg = JSON.parse(line);
                if (msg.type === 'change_summary') {
                  const { add = 0, change = 0, remove = 0 } = msg.changes;
                  summary = msg['@message'];
                  emoji = remove > 0 ? '🔴' : change > 0 ? '🟡' : add > 0 ? '🟢' : '⚪';
                  break;
                }
              } catch {}
            }
            if (!summary) summary = 'Plan summary unavailable';

            const planText = fs.existsSync(`${dir}/plan.txt`) ? fs.readFileSync(`${dir}/plan.txt`, 'utf8') : '';
            const planDisplay = planText.length > 65000
              ? planText.substring(0, 65000) + '\n...(truncated, see job logs for full output)'
              : planText;
            const body = [
              marker,
              '### Terraform plan — `owners/flungo`',
              '',
              `| Format | Validate | Plan |`,
              `|---|---|---|`,
              `| \`${{ steps.fmt.outcome }}\` | \`${{ steps.validate.outcome }}\` | \`${{ steps.plan.outcome }}\` |`,
              '',
              `${emoji} ${summary}`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              planDisplay,
              '```',
              '</details>',
            ].join('\n');
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # When the plan fails on the branch-protection guard, surface the offending
      # repositories' *classic* branch protection settings. The guard's data source
      # exposes only each rule's pattern, so it can't compare — this fetches the
      # full settings via GraphQL (using the provider PAT, which already has admin
      # on the managed repos) and prints them to the log and the run summary. It is
      # the read side of the classic→ruleset migration: compare these against the
      # ruleset before removing the classic rule. See
      # docs/runbooks/migrating-classic-protection-to-ruleset.md.
      - name: Surface blocking classic protection
        if: steps.plan.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.FLUNGO_GITHUB_TOKEN }}
        run: |
          repos=$(jq -rR '
            fromjson?
            | select(.["@level"] == "error"
              and .diagnostic.summary == "Resource postcondition failed"
              and (.diagnostic.detail | test(" has classic branch protection rule")))
            | .diagnostic.detail
            | capture("^(?<r>[^ ]+) has classic branch protection").r
          ' plan.jsonl | sort -u) || repos=""
          if [ -z "$repos" ]; then
            echo "No branch-protection guard failures in this plan; nothing to surface."
            exit 0
          fi
          for repo in $repos; do
            {
              echo "## Classic branch protection blocking \`$repo\`"
              echo
              echo "Compare against the ruleset before removing it (repo → Settings → Branches)."
              echo
              echo '```json'
              gh api graphql -f owner=flungo -f name="$repo" -f query='
                query($owner: String!, $name: String!) {
                  repository(owner: $owner, name: $name) {
                    branchProtectionRules(first: 100) {
                      nodes {
                        pattern
                        requiresApprovingReviews
                        requiredApprovingReviewCount
                        requiresCodeOwnerReviews
                        dismissesStaleReviews
                        requiresConversationResolution
                        requiresLinearHistory
                        requiresStatusChecks
                        requiresStrictStatusChecks
                        requiredStatusCheckContexts
                        requiresCommitSignatures
                        isAdminEnforced
                        restrictsPushes
                        allowsForcePushes
                        allowsDeletions
                        lockBranch
                      }
                    }
                  }
                }' || echo "(failed to fetch settings for $repo)"
              echo '```'
            } | tee -a "$GITHUB_STEP_SUMMARY"
          done

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Apply on merge to main (adopts imports / makes intended changes) or on a
      # manual workflow_dispatch apply. Ensure the PR plan is clean before merging.
      - name: Apply
        if: >-
          steps.plan.outcome == 'success' && (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' && inputs.operation == 'apply')
          )
        run: terraform apply -auto-approve tfplan
